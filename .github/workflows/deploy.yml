name: Deploy to Server

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # 백엔드 업데이트 (.env는 서버 전용이므로 보존)
            cd /home/ubuntu/draw_phase2_backend
            cp backend/.env /tmp/draw_backend.env.bak 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/draw_backend.env.bak backend/.env 2>/dev/null || true
            rm -f /tmp/draw_backend.env.bak
            sudo systemctl restart draw-backend

            # 프론트엔드 업데이트 (.env 보존)
            cd /home/ubuntu/my-web-app
            cp frontend/.env /tmp/draw_frontend.env.bak 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/draw_frontend.env.bak frontend/.env 2>/dev/null || true
            rm -f /tmp/draw_frontend.env.bak
            sudo systemctl restart draw-frontend

            echo "✅ 배포 완료"
