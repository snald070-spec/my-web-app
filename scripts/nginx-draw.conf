# Nginx reverse-proxy config for Draw Phase 2
# ─────────────────────────────────────────────────────────────────────────────
# 사용 조건: 도메인 + Let's Encrypt SSL 인증서 필요
# (Cloudflare Tunnel 사용 시 이 파일은 불필요합니다)
#
# 배치 경로 (Linux): /etc/nginx/sites-available/draw.conf
#              심볼릭링크: ln -s /etc/nginx/sites-available/draw.conf /etc/nginx/sites-enabled/
#
# 인증서 발급: certbot --nginx -d your-domain.com
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones (DDoS 방어)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name your-domain.com;

    # Let's Encrypt ACME verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ── SSL (certbot 발급 후 경로) ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # TLS 1.2 이상만 허용
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── 연결 제한 ────────────────────────────────────────────────────────────
    limit_conn conn_limit 20;
    client_max_body_size 5m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Cache-Control             "no-store"                                      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # ── 로그인 엔드포인트 강화 rate limit ────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API proxy → FastAPI (port 8000) ──────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_hide_header  X-Powered-By;
    }

    # ── Static frontend files (npm run build → dist/) ────────────────────────
    root /home/ubuntu/my-web-app/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|svg|webp|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 민감 파일 접근 차단 ──────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location ~* \.(env|db|sqlite|log|bak|key|pem)$ {
        deny all;
    }
}
