# Nginx reverse-proxy config for Draw Phase 2
# ─────────────────────────────────────────────────────────────────────────────
# 사용 조건: 도메인 + Let's Encrypt SSL 인증서 필요
# (Cloudflare Tunnel 사용 시 이 파일은 불필요합니다)
#
# 배치 경로 (Linux): /etc/nginx/sites-available/draw.conf
#              심볼릭링크: ln -s /etc/nginx/sites-available/draw.conf /etc/nginx/sites-enabled/
#
# 인증서 발급: certbot --nginx -d draw.example.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name draw.example.com;

    # Let's Encrypt ACME verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name draw.example.com;

    # ── SSL (certbot 발급 후 경로) ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/draw.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/draw.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Cache-Control             "no-store"                             always;

    # ── API proxy → FastAPI (port 8000) ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Static frontend files (npm run build → dist/) ────────────────────────
    root /var/www/draw/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|svg|webp|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
